<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<title>cc-chat</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
<style>
/* ═══════════════════════════════════════════════════
   cc-chat — VSCode CC 插件风格
   保留全部 WebSocket 协议，仅重写视觉层 + 新增输入栏
   ═══════════════════════════════════════════════════ */

:root {
  --bg:          #0d1117;
  --bg-surface:  #161b22;
  --bg-card:     #1c2128;
  --bg-hover:    #21262d;
  --border:      #30363d;
  --text:        #e6edf3;
  --text-muted:  #8b949e;
  --accent:      #58a6ff;
  --accent-dim:  rgba(88,166,255,.12);
  --green:       #3fb950;
  --yellow:      #d29922;
  --red:         #f85149;
  --radius:      12px;
  --radius-sm:   8px;
  --sidebar-w:   260px;
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --ease:        .2s cubic-bezier(.4,0,.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; width: 100%; overflow: hidden;
  background: var(--bg);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
}

/* ── Login Overlay ─────────────────────────────── */
#overlay {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center; z-index: 200;
}
#overlay.hidden { display: none; }
.login-card {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 36px 28px; width: min(380px, 90vw);
  box-shadow: 0 12px 40px rgba(0,0,0,.4); text-align: center;
}
.login-card .logo {
  font-size: 36px; margin-bottom: 6px; font-weight: 800;
  background: linear-gradient(135deg, var(--accent), #a371f7);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
.login-card .sub { color: var(--text-muted); font-size: 13px; margin-bottom: 24px; }
.login-card input {
  width: 100%; padding: 12px 14px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--bg); color: var(--text);
  font-size: 15px; outline: none; transition: border-color var(--ease);
  -webkit-appearance: none;
}
.login-card input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.login-card input::placeholder { color: var(--text-muted); }
.login-card button {
  width: 100%; padding: 13px; border-radius: var(--radius); border: none;
  background: var(--accent); color: #fff; font-weight: 600; font-size: 15px;
  cursor: pointer; margin-top: 12px; transition: opacity var(--ease);
  -webkit-appearance: none;
}
.login-card button:hover { opacity: .9; }
.login-card .err { color: var(--red); font-size: 13px; margin-top: 12px; display: none; }

/* ── App Shell ─────────────────────────────────── */
#app { display: flex; height: 100%; width: 100%; overflow: hidden; }
#app.hidden { display: none; }

/* ── Sidebar ───────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--bg-surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0; z-index: 50;
  transition: transform var(--ease);
}
.sb-header {
  padding: 14px 14px; padding-top: calc(14px + var(--safe-top));
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.sb-header h1 {
  font-size: 15px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), #a371f7);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
.btn-new {
  width: 30px; height: 30px; border-radius: 6px; border: none;
  background: var(--accent); color: #fff; font-size: 18px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: opacity var(--ease);
}
.btn-new:hover { opacity: .85; }

#session-list { flex: 1; overflow-y: auto; padding: 6px; -webkit-overflow-scrolling: touch; }
#session-list::-webkit-scrollbar { width: 3px; }
#session-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.sess-item {
  padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  transition: background var(--ease); margin-bottom: 1px; font-size: 13px;
}
.sess-item:hover { background: var(--bg-hover); }
.sess-item.active { background: var(--accent-dim); }
.badge { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.badge.on  { background: var(--green); box-shadow: 0 0 5px var(--green); }
.badge.off { background: var(--red); }
.sess-item .name {
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sess-item .del {
  width: 22px; height: 22px; border-radius: 4px; border: none;
  background: transparent; color: var(--text-muted); cursor: pointer;
  font-size: 14px; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; opacity: 0; transition: all var(--ease);
}
.sess-item:hover .del { opacity: 1; }
.sess-item .del:hover { background: rgba(248,81,73,.15); color: var(--red); }

.sb-footer {
  padding: 10px 14px; padding-bottom: calc(10px + var(--safe-bottom));
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text-muted);
}
.status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; transition: all .3s; }
.status-dot.green  { background: var(--green); box-shadow: 0 0 5px var(--green); }
.status-dot.red    { background: var(--red); }
.status-dot.yellow { background: var(--yellow); }

/* ── Main ──────────────────────────────────────── */
#main {
  flex: 1; display: flex; flex-direction: column;
  min-width: 0; overflow: hidden;
}
.main-header {
  height: 46px; padding: 0 14px; padding-top: var(--safe-top);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg-surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.main-header .left { display: flex; align-items: center; gap: 10px; min-width: 0; }
.main-header .session-name {
  font-size: 14px; font-weight: 600; max-width: 180px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.main-header .status-pill {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; padding: 3px 8px; border-radius: 12px;
  background: var(--bg); border: 1px solid var(--border); white-space: nowrap;
}
.main-header .status-pill .dot {
  width: 5px; height: 5px; border-radius: 50%; transition: background .3s;
}
.main-header .right { display: flex; gap: 4px; flex-shrink: 0; }

/* ── Terminal Area ─────────────────────────────── */
#terminal-wrap {
  flex: 1; min-height: 0; position: relative;
  overflow: hidden; background: var(--bg);
}
.term-pane {
  position: absolute; inset: 0; display: none; padding: 6px 10px;
}
.term-pane.active { display: block; }
.term-pane .xterm { padding: 0; }
.term-pane .xterm-viewport::-webkit-scrollbar { width: 5px; }
.term-pane .xterm-viewport::-webkit-scrollbar-thumb {
  background: var(--border); border-radius: 3px;
}

/* ── Input Bar ─────────────────────────────────── */
#input-bar {
  padding: 10px 14px; padding-bottom: calc(10px + var(--safe-bottom));
  background: var(--bg-surface); border-top: 1px solid var(--border);
  display: flex; align-items: flex-end; gap: 8px; flex-shrink: 0;
}
#input-bar .input-wrap {
  flex: 1; display: flex; align-items: flex-end;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 4px 4px 4px 8px;
  transition: border-color var(--ease);
}
#input-bar .input-wrap:focus-within {
  border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim);
}
#input-bar textarea {
  flex: 1; border: none; outline: none; background: transparent;
  color: var(--text); font-size: 14px; font-family: inherit;
  resize: none; line-height: 1.5; padding: 6px 0;
  min-height: 24px; max-height: 120px; /* ~5行 */
  -webkit-appearance: none;
}
#input-bar textarea::placeholder { color: var(--text-muted); }
#btn-upload {
  width: 34px; height: 34px; border-radius: var(--radius-sm); border: none;
  background: transparent; color: var(--text-muted); font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all var(--ease);
}
#btn-upload:hover { color: var(--text); background: var(--bg-hover); }
#btn-send {
  width: 34px; height: 34px; border-radius: var(--radius-sm); border: none;
  background: var(--accent); color: #fff; font-size: 15px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: opacity var(--ease);
}
#btn-send:hover { opacity: .85; }
#btn-send:disabled { opacity: .4; cursor: not-allowed; }

/* ── Hamburger (mobile) ────────────────────────── */
#hamburger {
  display: none; position: fixed;
  top: calc(8px + var(--safe-top)); left: 8px; z-index: 100;
  width: 36px; height: 36px; border-radius: var(--radius-sm); border: none;
  background: var(--bg-card); color: var(--text); font-size: 18px;
  align-items: center; justify-content: center; cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,.3);
}
#sidebar-mask { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 49; }

/* ── New Session Modal ─────────────────────────── */
#new-session-modal {
  position: fixed; inset: 0; background: rgba(0,0,0,.6);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center; z-index: 250;
}
#new-session-modal.hidden { display: none; }
.modal-card {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 24px 20px;
  width: min(380px, 90vw); max-height: 85vh; overflow-y: auto;
  box-shadow: 0 12px 40px rgba(0,0,0,.5);
}
.modal-card h3 { font-size: 17px; margin-bottom: 18px; font-weight: 700; }
.modal-card .field { margin-bottom: 12px; }
.modal-card label {
  display: block; font-size: 11px; color: var(--text-muted);
  margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px;
}
.modal-card input, .modal-card select {
  width: 100%; padding: 9px 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--bg); color: var(--text);
  font-size: 14px; outline: none; -webkit-appearance: none;
  transition: border-color var(--ease);
}
.modal-card input:focus, .modal-card select:focus {
  border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim);
}
.modal-card .btns { display: flex; gap: 8px; margin-top: 18px; }
.modal-card .btns button {
  flex: 1; padding: 11px; border-radius: var(--radius-sm); border: none;
  font-weight: 600; font-size: 14px; cursor: pointer; transition: all var(--ease);
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { opacity: .85; }
.btn-cancel { background: var(--bg-hover); color: var(--text); border: 1px solid var(--border) !important; }
.btn-cancel:hover { background: var(--border); }

/* ── Mobile ────────────────────────────────────── */
@media (max-width: 767px) {
  #hamburger { display: flex; }
  #sidebar {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: 280px; min-width: 280px; max-width: 85vw;
    transform: translateX(-100%); box-shadow: 4px 0 20px rgba(0,0,0,.5);
  }
  #sidebar.open { transform: translateX(0); }
  #app.sidebar-open #sidebar-mask { display: block; }
  .main-header { padding-left: 52px; }
  .sess-item .del { opacity: 1; }
}
</style>
</head>
<body>

<!-- ═══ Login ═══ -->
<div id="overlay">
  <div class="login-card">
    <div class="logo">cc-chat</div>
    <div class="sub">输入 Token 连接到你的 Claude Code</div>
    <input id="t" type="password" placeholder="Token…"
           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
    <button id="go">连接</button>
    <div class="err" id="err"></div>
  </div>
</div>

<!-- ═══ App ═══ -->
<div id="app" class="hidden">
  <div id="sidebar-mask"></div>
  <button id="hamburger">☰</button>

  <!-- New Session Modal -->
  <div id="new-session-modal" class="hidden">
    <div class="modal-card">
      <h3>新建会话</h3>
      <div class="field"><label>会话名称</label>
        <input id="ns-name" type="text" placeholder="窗口 1" autocomplete="off" /></div>
      <div class="field"><label>主题</label>
        <select id="ns-theme">
          <option value="dark" selected>Dark — 深色</option>
          <option value="light">Light — 浅色</option>
        </select></div>
      <div class="field"><label>权限模式</label>
        <select id="ns-perm">
          <option value="auto" selected>Auto — 自动批准安全操作</option>
          <option value="acceptEdits">acceptEdits — 自动接受编辑</option>
          <option value="default">Default — 每次都询问</option>
          <option value="bypassPermissions">bypassPermissions — 全部跳过</option>
          <option value="plan">Plan — 只读规划模式</option>
          <option value="dontAsk">dontAsk — 不询问</option>
        </select></div>
      <div class="field"><label>模型 <span style="color:var(--text-muted);font-weight:400;text-transform:none">(可选)</span></label>
        <select id="ns-model">
          <option value="">默认</option>
          <option value="opus">Opus</option>
          <option value="sonnet">Sonnet</option>
          <option value="haiku">Haiku</option>
          <option value="fable">Fable 5</option>
        </select></div>
      <div class="field"><label>思考级别 <span style="color:var(--text-muted);font-weight:400;text-transform:none">(可选)</span></label>
        <select id="ns-effort">
          <option value="">默认</option>
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
          <option value="xhigh">X-High</option>
          <option value="max">Max</option>
        </select></div>
      <div class="btns">
        <button class="btn-cancel" onclick="document.getElementById('new-session-modal').classList.add('hidden')">取消</button>
        <button class="btn-primary" id="ns-confirm">创建</button>
      </div>
    </div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sb-header">
      <h1>cc-chat</h1>
      <button class="btn-new" id="btn-new" title="新建会话">+</button>
    </div>
    <div id="session-list"></div>
    <div class="sb-footer">
      <span class="status-dot" id="agent-dot"></span>
      <span id="agent-text">正在连接…</span>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <div class="main-header">
      <div class="left">
        <span class="session-name" id="header-session-name">cc-chat</span>
        <span class="status-pill">
          <span class="dot" id="header-dot"></span>
          <span id="header-status">初始化…</span>
        </span>
      </div>
      <div class="right">
        <button class="btn-new" id="btn-new-header" title="新建会话"
                style="width:28px;height:28px;font-size:16px;">+</button>
      </div>
    </div>

    <!-- Terminal (xterm 填满此区域) -->
    <div id="terminal-wrap"></div>

    <!-- Input Bar -->
    <div id="input-bar">
      <button id="btn-upload" title="上传文件">📎</button>
      <input type="file" id="file-input" hidden multiple />
      <div class="input-wrap">
        <textarea id="msg-input" placeholder="输入消息… (Enter 发送, Shift+Enter 换行)" rows="1"></textarea>
      </div>
      <button id="btn-send" title="发送 (Enter)">▶</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>
<script>
(() => {
  // ═══ DOM ═══════════════════════════════════════════════
  const overlay      = document.getElementById('overlay');
  const inp          = document.getElementById('t');
  const btn          = document.getElementById('go');
  const errEl        = document.getElementById('err');
  const app          = document.getElementById('app');
  const sessionList  = document.getElementById('session-list');
  const termWrap     = document.getElementById('terminal-wrap');
  const btnNew       = document.getElementById('btn-new');
  const btnNewHdr    = document.getElementById('btn-new-header');
  const agentDot     = document.getElementById('agent-dot');
  const agentText    = document.getElementById('agent-text');
  const headerDot    = document.getElementById('header-dot');
  const headerStatus = document.getElementById('header-status');
  const headerName   = document.getElementById('header-session-name');
  const hamburger    = document.getElementById('hamburger');
  const sidebar      = document.getElementById('sidebar');
  const sideMask     = document.getElementById('sidebar-mask');
  const msgInput     = document.getElementById('msg-input');
  const btnSend      = document.getElementById('btn-send');
  const btnUpload    = document.getElementById('btn-upload');
  const fileInput    = document.getElementById('file-input');

  // ═══ State ═════════════════════════════════════════════
  let ws = null;
  let sessions = [];
  let activeId = null;
  let panes = {};
  let agentAlive = false;
  let statusCheckTimer = null;  // 周期性状态检查
  const isMobile = () => window.matchMedia('(max-width: 767px)').matches;

  // ═══ Sidebar (mobile) ═══════════════════════════════════
  const openSidebar  = () => { sidebar.classList.add('open'); app.classList.add('sidebar-open'); };
  const closeSidebar = () => { sidebar.classList.remove('open'); app.classList.remove('sidebar-open'); };
  hamburger.addEventListener('click', openSidebar);
  sideMask.addEventListener('click', closeSidebar);

  // ═══ Agent Status ═══════════════════════════════════════
  function setAgentStatus(color, text) {
    agentDot.className = 'status-dot ' + color;
    agentText.textContent = text;
    const dotColor = color === 'green' ? 'var(--green)'
                   : color === 'red'   ? 'var(--red)' : 'var(--yellow)';
    headerDot.style.background = dotColor;
    headerDot.style.boxShadow  = color === 'green' ? '0 0 5px var(--green)' : 'none';
    headerStatus.textContent   = text;
    agentAlive = (color === 'green');
  }

  // 周期性状态检查：每 30s 发 get_sessions，有响应说明 agent 仍在
  function startStatusCheck() {
    stopStatusCheck();
    statusCheckTimer = setInterval(() => {
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'get_sessions' }));
      }
    }, 30000);
  }
  function stopStatusCheck() {
    if (statusCheckTimer) { clearInterval(statusCheckTimer); statusCheckTimer = null; }
  }

  // ═══ Terminal Font ══════════════════════════════════════
  function termFontSize() {
    if (!isMobile()) return 14;
    return window.innerWidth < 380 ? 11 : 13;
  }

  // ═══ Terminal Pane ══════════════════════════════════════
  function createPane(sessionId) {
    if (panes[sessionId]) return panes[sessionId];

    const wrap = document.createElement('div');
    wrap.className = 'term-pane';
    wrap.id = 'pane-' + sessionId;
    termWrap.appendChild(wrap);

    const term = new Terminal({
      fontSize: termFontSize(),
      fontFamily: '"Cascadia Code","Fira Code",Consolas,"SF Mono",monospace',
      cursorBlink: true,
      scrollback: 10000,
      letterSpacing: 0,
      lineHeight: 1.25,
      disableStdin: true,   // 禁用终端直接键盘输入，统一从输入栏发送
      theme: {
        background: '#0d1117',
        foreground: '#e6edf3',
        cursor: '#58a6ff',
        selectionBackground: 'rgba(88,166,255,.25)',
        black: '#484f58', red: '#ff7b72', green: '#3fb950', yellow: '#d29922',
        blue: '#58a6ff', magenta: '#bc8cff', cyan: '#39d353', white: '#e6edf3',
      },
    });
    const fit      = new FitAddon.FitAddon();
    const webLinks = new WebLinksAddon.WebLinksAddon();
    term.loadAddon(fit);
    term.loadAddon(webLinks);
    term.open(wrap);

    requestAnimationFrame(() => { try { fit.fit(); } catch {} });

    // onData 仍保留（resize 等场景可能触发），但 disableStdin 后用户不会直接打字
    term.onData(data => {
      if (ws && ws.readyState === 1)
        ws.send(JSON.stringify({ type: 'data', sessionId, data }));
    });
    term.onResize(({ cols, rows }) => {
      if (ws && ws.readyState === 1)
        ws.send(JSON.stringify({ type: 'resize', sessionId, cols, rows }));
    });

    const pane = { term, fit, elem: wrap };
    panes[sessionId] = pane;

    if (ws && ws.readyState === 1)
      ws.send(JSON.stringify({ type: 'get_history', sessionId }));

    return pane;
  }

  function destroyPane(sessionId) {
    const p = panes[sessionId];
    if (!p) return;
    p.term.dispose();
    p.elem.remove();
    delete panes[sessionId];
  }

  // ═══ Render ════════════════════════════════════════════
  function renderSidebar() {
    sessionList.innerHTML = '';
    for (const s of sessions) {
      const div = document.createElement('div');
      div.className = 'sess-item' + (s.id === activeId ? ' active' : '');
      div.innerHTML = `
        <span class="badge ${s.alive ? 'on' : 'off'}"></span>
        <span class="name">${esc(s.name)}</span>
        <button class="del" title="关闭">×</button>
      `;
      div.addEventListener('click', e => {
        if (e.target.classList.contains('del')) return;
        switchSession(s.id);
        if (isMobile()) closeSidebar();
      });
      div.querySelector('.del').addEventListener('click', e => {
        e.stopPropagation();
        killSession(s.id);
      });
      sessionList.appendChild(div);
    }
    updateHeader();
  }

  function updateHeader() {
    const s = sessions.find(s => s.id === activeId);
    headerName.textContent = s ? s.name : 'cc-chat';
  }

  // ═══ Switch Session ═════════════════════════════════════
  function switchSession(id) {
    if (!id) return;
    activeId = id;
    for (const [sid, p] of Object.entries(panes))
      p.elem.classList.toggle('active', sid === id);
    if (!panes[id]) createPane(id).elem.classList.add('active');
    requestAnimationFrame(() => {
      if (panes[id]) try { panes[id].fit.fit(); } catch {}
    });
    renderSidebar();
    msgInput.focus(); // 切换后聚焦输入框
  }

  // ═══ New Session Modal ══════════════════════════════════
  const nsModal   = document.getElementById('new-session-modal');
  const nsName    = document.getElementById('ns-name');
  const nsTheme   = document.getElementById('ns-theme');
  const nsPerm    = document.getElementById('ns-perm');
  const nsModel   = document.getElementById('ns-model');
  const nsEffort  = document.getElementById('ns-effort');
  const nsConfirm = document.getElementById('ns-confirm');

  function openNewSessionModal() {
    nsName.value = '窗口 ' + (sessions.length + 1);
    nsTheme.value = 'dark'; nsPerm.value = 'auto';
    nsModel.value = ''; nsEffort.value = '';
    nsModal.classList.remove('hidden');
    setTimeout(() => nsName.focus(), 100);
  }
  function closeNewSessionModal() { nsModal.classList.add('hidden'); }

  btnNew.addEventListener('click', openNewSessionModal);
  btnNewHdr.addEventListener('click', openNewSessionModal);
  nsConfirm.addEventListener('click', () => {
    const name = nsName.value.trim();
    if (!name) return;
    const opts = {
      name,
      theme: nsTheme.value || 'dark',
      permissionMode: nsPerm.value || 'auto',
      model:  nsModel.value  || undefined,
      effort: nsEffort.value || undefined,
    };
    if (ws && ws.readyState === 1)
      ws.send(JSON.stringify({ type: 'create_session', ...opts }));
    closeNewSessionModal();
    if (isMobile()) closeSidebar();
  });
  nsName.addEventListener('keydown', e => { if (e.key === 'Enter') nsConfirm.click(); });
  nsModal.addEventListener('click', e => { if (e.target === nsModal) closeNewSessionModal(); });

  function killSession(id) {
    if (!confirm('确定关闭这个会话？')) return;
    if (ws && ws.readyState === 1)
      ws.send(JSON.stringify({ type: 'kill_session', sessionId: id }));
  }

  // ═══ Input Bar ══════════════════════════════════════════
  function sendMessage() {
    const text = msgInput.value;
    if (!text || !activeId) return;
    // 逐字符发送到隐藏终端（模拟键盘输入）
    for (const char of text) {
      if (ws && ws.readyState === 1)
        ws.send(JSON.stringify({ type: 'data', sessionId: activeId, data: char }));
    }
    // 发送 Enter
    if (ws && ws.readyState === 1)
      ws.send(JSON.stringify({ type: 'data', sessionId: activeId, data: '\r' }));
    msgInput.value = '';
    autoResizeInput();
  }

  // Enter 发送, Shift+Enter 换行
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  btnSend.addEventListener('click', sendMessage);

  // textarea 自动增高
  function autoResizeInput() {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
  }
  msgInput.addEventListener('input', autoResizeInput);

  // 文件上传
  btnUpload.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => {
    const files = fileInput.files;
    if (!files.length) return;
    // 将文件名插入输入框（Claude Code 支持 @filepath 引用文件）
    let paths = '';
    for (const f of files) paths += ` @${f.name}`;
    msgInput.value += paths;
    msgInput.focus();
    autoResizeInput();
    fileInput.value = ''; // 重置
  });

  // ═══ WebSocket ══════════════════════════════════════════
  function connect(token) {
    stopStatusCheck(); // 清理旧的周期检查

    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + '/ws');
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      setAgentStatus('yellow', '正在鉴权…');
      ws.send(JSON.stringify({ type: 'auth', token, role: 'client' }));
    };

    ws.onmessage = e => {
      const raw = typeof e.data === 'string' ? e.data : new TextDecoder().decode(e.data);
      let msg;
      try { msg = JSON.parse(raw); } catch { return; }

      switch (msg.type) {
        case 'authed':
          overlay.classList.add('hidden');
          app.classList.remove('hidden');
          localStorage.setItem('cc_token', token);
          setAgentStatus('yellow', '等待 Agent…');
          ws.send(JSON.stringify({ type: 'get_sessions' }));
          break;

        case 'agent_online':
          setAgentStatus('green', 'Agent 在线');
          startStatusCheck(); // 启动周期性状态检查
          ws.send(JSON.stringify({ type: 'get_sessions' }));
          break;

        case 'agent_offline':
          setAgentStatus('red', 'Agent 离线');
          stopStatusCheck();
          break;

        case 'sessions': {
          sessions = msg.sessions || [];
          // 收到 sessions 响应 → 确认 agent 仍在
          if (sessions.length > 0 && !agentAlive) {
            setAgentStatus('green', 'Agent 在线');
          }
          if (!activeId && sessions.length > 0) activeId = sessions[0].id;
          const ids = new Set(sessions.map(s => s.id));
          for (const sid of Object.keys(panes))
            if (!ids.has(sid)) destroyPane(sid);
          if (activeId && !panes[activeId]) createPane(activeId);
          renderSidebar();
          if (activeId) switchSession(activeId);
          break;
        }

        case 'session_created':
          break;

        case 'session_killed':
          if (activeId === msg.sessionId) {
            destroyPane(msg.sessionId);
            activeId = null;
            const rest = sessions.filter(s => s.id !== msg.sessionId);
            if (rest.length > 0) activeId = rest[0].id;
          }
          break;

        case 'session_died': {
          const ds = sessions.find(s => s.id === msg.sessionId);
          if (ds) ds.alive = false;
          renderSidebar();
          break;
        }

        case 'data': {
          const pane = panes[msg.sessionId] || createPane(msg.sessionId);
          pane.term.write(
            typeof msg.data === 'string' ? msg.data : new Uint8Array(msg.data),
            () => {}
          );
          break;
        }

        case 'history': {
          const hp = panes[msg.sessionId] || createPane(msg.sessionId);
          hp.term.clear();
          for (const h of (msg.history || []))
            hp.term.write(typeof h.data === 'string' ? h.data : new Uint8Array(h.data), () => {});
          break;
        }

        case 'error':
          errEl.textContent = msg.message;
          errEl.style.display = 'block';
          setAgentStatus('red', '错误');
          break;

        case 'ping':
          ws.send(JSON.stringify({ type: 'pong' }));
          break;
      }
    };

    ws.onclose = () => {
      stopStatusCheck();
      setAgentStatus('yellow', '已断开，3s 后重连…');
      setTimeout(() => {
        if (!ws || ws.readyState > 1) connect(token);
      }, 3000);
    };
    ws.onerror = () => {};
  }

  // ═══ Events ═════════════════════════════════════════════
  btn.addEventListener('click', () => {
    const t = inp.value.trim();
    if (!t) return;
    errEl.style.display = 'none';
    connect(t);
  });
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });

  // ═══ Resize ═════════════════════════════════════════════
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      for (const p of Object.values(panes))
        try { p.fit.fit(); } catch {}
    }, 150);
  });

  // ═══ Auto-login ═════════════════════════════════════════
  const saved = localStorage.getItem('cc_token');
  if (saved) { inp.value = saved; connect(saved); }

  // ═══ Util ═══════════════════════════════════════════════
  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }
})();
</script>
</body>
</html>
